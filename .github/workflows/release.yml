name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build & release (must already exist on the repo, e.g. v1.7).'
        required: true
        type: string

# Serialize releases of the same tag — protects against accidental double-runs
# overwriting a finished release with a half-built artifact.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ] || [[ "$TAG" == refs/* ]]; then
            echo "::error::Could not determine a release tag from ref '$GITHUB_REF'."
            exit 1
          fi
          echo "Resolved tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 1

      # Fail fast if there's no release notes file for this tag — this is the
      # contract: every release must ship with a pre-written ReleaseNotes/<tag>.md.
      - name: Verify release notes file
        id: notes
        run: |
          set -euo pipefail
          NOTES_PATH="ReleaseNotes/${{ steps.tag.outputs.tag }}.md"
          if [ ! -f "$NOTES_PATH" ]; then
            echo "::error::Release notes file '$NOTES_PATH' is missing. Create it on the release branch and re-tag."
            exit 1
          fi
          if [ ! -s "$NOTES_PATH" ]; then
            echo "::error::Release notes file '$NOTES_PATH' exists but is empty."
            exit 1
          fi
          echo "notes_path=$NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build, sign, notarize, staple, package
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          NOTARY_API_KEY_BASE64: ${{ secrets.NOTARY_API_KEY_BASE64 }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh

      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: StarLight-${{ steps.tag.outputs.tag }}
          path: build/dist/StarLight-${{ steps.tag.outputs.tag }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ASSET="build/dist/StarLight-${RELEASE_TAG}.zip"
          if gh release view "$RELEASE_TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — overwriting the asset."
            gh release upload "$RELEASE_TAG" "$ASSET" --clobber --repo "$REPO"
          else
            gh release create "$RELEASE_TAG" "$ASSET" \
              --title "$RELEASE_TAG" \
              --notes-file "$NOTES_PATH" \
              --repo "$REPO"
          fi
